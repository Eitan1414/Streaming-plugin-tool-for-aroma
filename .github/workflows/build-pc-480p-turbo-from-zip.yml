name: Build PC 480p Turbo client

on:
  workflow_dispatch:
    inputs:
      source_zip:
        description: "Nom exact du ZIP du client PC"
        required: true
        default: "WiiUStream-PC-Client-v0.5.0-480p-turbo.zip"

  push:
    paths:
      - "WiiUStream-PC-Client-v0.5.0-480p-turbo.zip"
      - ".github/workflows/build-pc-480p-turbo-from-zip.yml"

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Télécharger le dépôt
        uses: actions/checkout@v4

      - name: Installer Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Vérifier et décompresser le ZIP
        id: source
        shell: pwsh
        env:
          SOURCE_ZIP: ${{ inputs.source_zip }}
        run: |
          $ErrorActionPreference = "Stop"

          if ($env:SOURCE_ZIP) {
            $zipFile = $env:SOURCE_ZIP
          }
          else {
            $zipFile = "WiiUStream-PC-Client-v0.5.0-480p-turbo.zip"
          }

          Write-Host "ZIP demandé : $zipFile"

          if (-not (Test-Path -LiteralPath $zipFile)) {
            Write-Host "ZIP disponibles dans le dépôt :"

            Get-ChildItem `
              -Path . `
              -Filter *.zip `
              -File `
              -Recurse |
              Select-Object -ExpandProperty FullName

            throw "ZIP introuvable : $zipFile"
          }

          $extractDir = Join-Path `
            $env:RUNNER_TEMP `
            "wiiustream-pc"

          if (Test-Path -LiteralPath $extractDir) {
            Remove-Item `
              -LiteralPath $extractDir `
              -Recurse `
              -Force
          }

          New-Item `
            -ItemType Directory `
            -Path $extractDir |
            Out-Null

          Expand-Archive `
            -LiteralPath $zipFile `
            -DestinationPath $extractDir `
            -Force

          Write-Host "Contenu décompressé :"

          Get-ChildItem `
            -Path $extractDir `
            -File `
            -Recurse |
            Select-Object -ExpandProperty FullName

          $projects = @(
            Get-ChildItem `
              -Path $extractDir `
              -Filter main.py `
              -File `
              -Recurse |
            Where-Object {
              $root = $_.Directory.FullName

              $requirementsBuild = Join-Path `
                $root `
                "requirements-build.txt"

              $protocolFile = Join-Path `
                $root `
                "wiiu_stream\protocol.py"

              $hasRequirements = Test-Path `
                -LiteralPath $requirementsBuild

              $hasProtocol = Test-Path `
                -LiteralPath $protocolFile

              return ($hasRequirements -and $hasProtocol)
            }
          )

          if ($projects.Count -eq 0) {
            throw "Aucun projet PC valide n’a été trouvé dans le ZIP."
          }

          if ($projects.Count -gt 1) {
            Write-Host "Plusieurs projets ont été détectés :"

            $projects |
              ForEach-Object {
                Write-Host " - $($_.Directory.FullName)"
              }

            throw "Impossible de choisir automatiquement le projet."
          }

          $projectDir = $projects[0].Directory.FullName

          "project_dir=$projectDir" |
            Out-File `
              -FilePath $env:GITHUB_OUTPUT `
              -Encoding utf8 `
              -Append

          Write-Host "Projet détecté : $projectDir"

      - name: Vérifier les fichiers du projet
        working-directory: ${{ steps.source.outputs.project_dir }}
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $requiredFiles = @(
            "main.py",
            "requirements-build.txt",
            "wiiu_stream\protocol.py",
            "assets\wiiustream.ico"
          )

          foreach ($file in $requiredFiles) {
            if (-not (Test-Path -LiteralPath $file)) {
              throw "Fichier requis absent : $file"
            }
          }

          Get-ChildItem `
            -Path . `
            -File `
            -Recurse |
            Select-Object -ExpandProperty FullName

      - name: Installer les dépendances
        working-directory: ${{ steps.source.outputs.project_dir }}
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          python -m pip install --upgrade pip
          python -m pip install -r requirements-build.txt

      - name: Tester le protocole v2
        working-directory: ${{ steps.source.outputs.project_dir }}
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          python -m unittest discover -s tests -v

      - name: Compiler l’exécutable Windows
        working-directory: ${{ steps.source.outputs.project_dir }}
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          python -m PyInstaller `
            --noconfirm `
            --clean `
            --onefile `
            --windowed `
            --name WiiUStream-PC-480p-Turbo `
            --icon assets\wiiustream.ico `
            --hidden-import PIL._tkinter_finder `
            main.py

      - name: Vérifier l’exécutable
        working-directory: ${{ steps.source.outputs.project_dir }}
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $exe = "dist\WiiUStream-PC-480p-Turbo.exe"

          if (-not (Test-Path -LiteralPath $exe)) {
            Write-Host "Contenu du dossier dist :"

            if (Test-Path -LiteralPath "dist") {
              Get-ChildItem `
                -Path "dist" `
                -File `
                -Recurse |
                Select-Object -ExpandProperty FullName
            }

            throw "L’exécutable n’a pas été produit."
          }

          $hash = (
            Get-FileHash `
              -LiteralPath $exe `
              -Algorithm SHA256
          ).Hash.ToLower()

          "$hash  WiiUStream-PC-480p-Turbo.exe" |
            Out-File `
              -Encoding ascii `
              "dist\WiiUStream-PC-480p-Turbo.exe.sha256"

          Get-ChildItem `
            -Path dist `
            -File

      - name: Mettre le client PC en téléchargement
        uses: actions/upload-artifact@v4
        with:
          name: WiiUStream-PC-480p-Turbo
          path: |
            ${{ steps.source.outputs.project_dir }}/dist/WiiUStream-PC-480p-Turbo.exe
            ${{ steps.source.outputs.project_dir }}/dist/WiiUStream-PC-480p-Turbo.exe.sha256
          if-no-files-found: error
          retention-days: 30
